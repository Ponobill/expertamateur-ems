<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Radiant Thermostat Wiring Schematic</title>
<desc>ESP32 CYD wired to DHT22 sensor, optoisolated relay, and 24VAC power supply, driving the Taco SR501 switching relay for hydronic radiant heating.</desc>

<style>
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #4a4a4a; }
  .c-amber rect { fill: #fef3c7; stroke: #92400e; }
  .c-amber text { fill: #4a1b0c; }
  .c-gray rect { fill: #f3f4f6; stroke: #6b7280; }
  .c-gray text { fill: #1f2937; }
  .c-green rect { fill: #d1fae5; stroke: #065f46; }
  .c-green text { fill: #064e3b; }
  .c-purple rect { fill: #ede9fe; stroke: #5b21b6; }
  .c-purple text { fill: #3c3489; }
  .c-blue rect { fill: #dbeafe; stroke: #1e40af; }
  .c-blue text { fill: #042c53; }
  .c-teal rect { fill: #ccfbf1; stroke: #115e59; }
  .c-teal text { fill: #134e4a; }
  .c-coral rect { fill: #fed7aa; stroke: #9a3412; }
  .c-coral text { fill: #4a1b0c; }
  .arr { stroke: #4a4a4a; stroke-width: 1.5; fill: none; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="40" y="32">Power input</text>
<g class="c-amber">
<rect x="40" y="48" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="70" text-anchor="middle" dominant-baseline="central">Taco SR501 24VAC</text>
<text class="ts" x="130" y="88" text-anchor="middle" dominant-baseline="central">R / C terminals</text>
</g>

<line x1="220" y1="76" x2="270" y2="76" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="245" y="68" text-anchor="middle">24VAC</text>

<g class="c-gray">
<rect x="270" y="48" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="360" y="70" text-anchor="middle" dominant-baseline="central">Buck converter</text>
<text class="ts" x="360" y="88" text-anchor="middle" dominant-baseline="central">24VAC in → 5VDC out</text>
</g>

<line x1="450" y1="76" x2="500" y2="76" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="475" y="68" text-anchor="middle">5V</text>

<g class="c-green">
<rect x="500" y="48" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="70" text-anchor="middle" dominant-baseline="central">5V rail</text>
<text class="ts" x="570" y="88" text-anchor="middle" dominant-baseline="central">Powers everything</text>
</g>

<text class="th" x="40" y="148">Controller</text>
<g class="c-purple">
<rect x="240" y="164" width="200" height="280" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="186" text-anchor="middle" dominant-baseline="central">ESP32 CYD board</text>
<text class="ts" x="340" y="204" text-anchor="middle" dominant-baseline="central">ESP32-2432S028R</text>

<rect x="256" y="220" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="235">P1: VIN</text>
<text class="ts" x="416" y="235" text-anchor="end">← 5V rail</text>

<rect x="256" y="246" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="261">SPI bus 1 (HSPI)</text>
<text class="ts" x="416" y="261" text-anchor="end">→ TFT display</text>

<rect x="256" y="272" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="287">SPI bus 2 (VSPI)</text>
<text class="ts" x="416" y="287" text-anchor="end">→ XPT2046 touch</text>

<rect x="256" y="298" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="313">CN1: 3.3V</text>
<text class="ts" x="416" y="313" text-anchor="end">→ DHT22 VCC</text>

<rect x="256" y="324" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="339">CN1: GND</text>
<text class="ts" x="416" y="339" text-anchor="end">→ DHT22 + relay GND</text>

<rect x="256" y="350" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="365">CN1: GPIO27</text>
<text class="ts" x="416" y="365" text-anchor="end">→ DHT22 DATA</text>

<rect x="256" y="376" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="391">CN1: GPIO22</text>
<text class="ts" x="416" y="391" text-anchor="end">→ relay IN1 (active LOW)</text>

<rect x="256" y="402" width="168" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="264" y="417">GPIO 4 / 16 / 17</text>
<text class="ts" x="416" y="417" text-anchor="end">→ onboard RGB LED</text>
</g>

<text class="th" x="40" y="488">Peripherals</text>
<g class="c-blue">
<rect x="40" y="504" width="180" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="524" text-anchor="middle" dominant-baseline="central">2.8" TFT + touch</text>
<text class="ts" x="130" y="544" text-anchor="middle" dominant-baseline="central">ILI9341 (built-in)</text>
<text class="ts" x="130" y="562" text-anchor="middle" dominant-baseline="central">XPT2046 resistive touch</text>
<text class="ts" x="130" y="578" text-anchor="middle" dominant-baseline="central">240×320, portrait</text>
</g>

<g class="c-teal">
<rect x="240" y="504" width="200" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="524" text-anchor="middle" dominant-baseline="central">DHT22 / AM2302</text>
<text class="ts" x="340" y="544" text-anchor="middle" dominant-baseline="central">Temp + humidity</text>
<text class="ts" x="340" y="562" text-anchor="middle" dominant-baseline="central">VCC, GND, DATA</text>
<text class="ts" x="340" y="578" text-anchor="middle" dominant-baseline="central">10K pullup on DATA</text>
</g>

<g class="c-coral">
<rect x="460" y="504" width="180" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="524" text-anchor="middle" dominant-baseline="central">Optoisolated relay</text>
<text class="ts" x="550" y="544" text-anchor="middle" dominant-baseline="central">Single channel, active LOW</text>
<text class="ts" x="550" y="562" text-anchor="middle" dominant-baseline="central">5V coil, 3.3V trigger OK</text>
<text class="ts" x="550" y="578" text-anchor="middle" dominant-baseline="central">PC817 optocoupler</text>
</g>

<line x1="240" y1="265" x2="140" y2="265" stroke="#042C53" stroke-width="0.8" fill="none"/>
<line x1="140" y1="265" x2="140" y2="504" stroke="#042C53" stroke-width="0.8" fill="none"/>

<line x1="340" y1="444" x2="340" y2="504" stroke="#134E4A" stroke-width="0.8" fill="none"/>

<line x1="440" y1="391" x2="550" y2="391" stroke="#4A1B0C" stroke-width="0.8" fill="none"/>
<line x1="550" y1="391" x2="550" y2="504" stroke="#4A1B0C" stroke-width="0.8" fill="none"/>

<text class="th" x="40" y="628">Heat call output</text>
<g class="c-coral">
<rect x="40" y="644" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="666" text-anchor="middle" dominant-baseline="central">Relay COM + NO</text>
<text class="ts" x="130" y="684" text-anchor="middle" dominant-baseline="central">Dry contact, no voltage</text>
</g>

<line x1="220" y1="672" x2="270" y2="672" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="245" y="664" text-anchor="middle">closes</text>

<g class="c-amber">
<rect x="270" y="644" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="666" text-anchor="middle" dominant-baseline="central">SR501 T-T terminals</text>
<text class="ts" x="370" y="684" text-anchor="middle" dominant-baseline="central">Thermostat input</text>
</g>

<line x1="470" y1="672" x2="500" y2="672" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="500" y="644" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="666" text-anchor="middle" dominant-baseline="central">Heat call</text>
<text class="ts" x="570" y="684" text-anchor="middle" dominant-baseline="central">Circulator + zone valve</text>
</g>

<rect x="40" y="728" width="600" height="60" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="th" x="340" y="750" text-anchor="middle">Existing 3-conductor cable to thermostat location</text>
<text class="ts" x="340" y="770" text-anchor="middle">Red = R (24VAC hot), White = W (heat call), Blue = C (24VAC common)</text>

<text class="ts" x="340" y="800" text-anchor="middle" font-style="italic">ExpertAmateur radiant thermostat — wiring schematic</text>
</svg>
